# Fixed `dataset.html`

Replace your current file with this version.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headband Dataset Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.controls {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button, input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
}

video, canvas {
  width: 100%;
  max-width: 900px;
  border: 2px solid #333;
  border-radius: 12px;
}

#status {
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>Headband Dataset Tool</h1>
<p>Upload an MP4 video to generate head-region crops.</p>

<div class="controls">
  <input type="file" id="videoUpload" accept="video/mp4,video/*">
  <button id="playBtn">Play</button>
  <button id="pauseBtn">Pause</button>
</div>

<video id="video" controls></video>
<canvas id="canvas"></canvas>

<div id="status">Waiting for video...</div>

<script>
const videoUpload = document.getElementById('videoUpload');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

videoUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];

  if (!file) return;

  const url = URL.createObjectURL(file);
  video.src = url;

  statusEl.textContent = `Loaded: ${file.name}`;
});

video.addEventListener('loadedmetadata', () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
});

video.addEventListener('play', drawLoop);

function drawLoop() {
  if (video.paused || video.ended) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  requestAnimationFrame(drawLoop);
}

document.getElementById('playBtn').onclick = () => video.play();
document.getElementById('pauseBtn').onclick = () => video.pause();
</script>

</body>
</html>
```
